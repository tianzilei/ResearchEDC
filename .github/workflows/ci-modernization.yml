name: CI Modernization

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

concurrency:
  group: ci-modernization-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Build
    uses: ./.github/workflows/backend-modernization.yml

  frontend:
    name: Frontend Build
    uses: ./.github/workflows/frontend-modernization.yml

  questionnaire:
    name: Questionnaire Service
    uses: ./.github/workflows/questionnaire-modernization.yml

  docker-compose:
    name: Docker Compose Check
    uses: ./.github/workflows/docker-compose-check.yml

  legacy-report:
    name: Legacy Refactor Report
    uses: ./.github/workflows/legacy-refactor-report.yml
