name: Legacy Refactor Report

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: legacy-report-${{ github.ref }}
  cancel-in-progress: true

jobs:
  report:
    name: Generate Legacy Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create report directory
        run: mkdir -p build/reports/legacy

      - name: Generate legacy refactor report
        run: bash scripts/ci/generate-legacy-report.sh

      - name: Upload legacy report artifact
        uses: actions/upload-artifact@v4
        with:
          name: legacy-refactor-report
          path: build/reports/legacy/
          retention-days: 30
