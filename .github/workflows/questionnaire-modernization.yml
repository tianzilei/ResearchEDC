name: Questionnaire Service Modernization

on:
  workflow_call:
  workflow_dispatch:
  push:
    paths:
      - "questionnaire-service/**"

concurrency:
  group: questionnaire-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Verify
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: questionnaire-service/apps/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and run tests
        run: |
          uv sync --extra dev
          .venv/bin/python -m pytest app/tests/ -v
