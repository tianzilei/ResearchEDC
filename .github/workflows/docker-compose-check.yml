name: Docker Compose Check

on:
  workflow_call:
  workflow_dispatch:
  push:
    paths:
      - "deploy/**"
      - "docker/**"
      - "Dockerfile"
      - "**/Dockerfile"
      - "compose*.yml"

concurrency:
  group: docker-compose-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Compose Config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose -f deploy/compose/docker-compose.dev.yml config

  scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose -f deploy/compose/docker-compose.dev.yml build

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: researchedf-app:latest
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          skip-dirs: /usr/local/tomcat/webapps/ROOT/WEB-INF/lib/
          trivy-config: .trivy-config.yml

  playwright:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Docker stack
        run: docker compose -f deploy/compose/docker-compose.dev.yml up -d --wait

      - name: Install Playwright
        working-directory: ./frontend
        run: |
          pnpm install
          npx playwright install chromium

      - name: Run Playwright tests
        working-directory: ./frontend
        run: npx playwright test

      - name: Shutdown Docker stack
        if: always()
        run: docker compose -f deploy/compose/docker-compose.dev.yml down
