name: Backend Modernization

on:
  workflow_call:
  workflow_dispatch:
  push:
    paths:
      - "pom.xml"
      - "**/pom.xml"
      - "app/**"
      - "shared/**"
      - "web/**"
      - "ws/**"
      - "scripts/**"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: clinica
          POSTGRES_PASSWORD: clinica
          POSTGRES_DB: openclinica
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Maven compile
        run: mvn -B clean compile -DskipTests

      - name: Modulith verification
        run: mvn test -pl app -Dtest=ModulithVerificationTest -Dsurefire.failIfNoSpecifiedTests=false

      - name: Module tests
        run: mvn test -pl app -am
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/openclinica
          SPRING_DATASOURCE_USERNAME: clinica
          SPRING_DATASOURCE_PASSWORD: clinica

      - name: Legacy guardrails
        run: bash scripts/ci/check-legacy-guardrails.sh

      - name: Phase B migration static checks
        run: bash scripts/ci/check-phase-b-migrations.sh
