name: Backend Modernization

on:
  workflow_call:
  workflow_dispatch:
  push:
    paths:
      - "pom.xml"
      - "**/pom.xml"
      - "app/**"
      - "shared/**"
      - "web/**"
      - "ws/**"
      - "scripts/**"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: clinica
          POSTGRES_PASSWORD: clinica
          POSTGRES_DB: openclinica
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Maven compile
        run: mvn -B clean compile -DskipTests

      - name: Modulith verification
        run: mvn test -pl app -Dtest=ModulithVerificationTest -Dsurefire.failIfNoSpecifiedTests=false

      - name: Module tests
        run: mvn test -pl app -am
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/openclinica
          SPRING_DATASOURCE_USERNAME: clinica
          SPRING_DATASOURCE_PASSWORD: clinica

      - name: Gauntlet — verify 0 new XxxDAO() in consumer code
        run: |
          echo "=== Checking for direct legacy DAO construction in consumer code ==="
          git grep -n 'new \([A-Z][a-zA-Z]*DAO\b\|CrfDao\|RuleDao\|StudyDao\|SubjectDao\|DatasetDao\|FilterDao\|StudyGroupDao\|DiscrepancyNoteDao\|EventCrfDao\|ItemDao\|ItemDataDao\|ItemGroupDao\|SectionDao\|ItemFormMetadataDao\|ItemGroupMetadataDao\)(' -- '*.java' ':!app/src/main/java/org/researchedc/config/' ':!shared/src/main/java/org/researchedc/dao/' ':!*Test*.java' ':!*adapter/Item*' ':!*adapter/Section*' ':!*adapter/Event*' ':!*adapter/Crf*' ':!*adapter/Rule*' ':!*adapter/Study*' ':!*adapter/Subject*' ':!*adapter/User*' ':!*adapter/Filter*' ':!*adapter/Dataset*' ':!*adapter/Discrepancy*' > /tmp/gauntlet-new-dao.txt || true
          if [ -s /tmp/gauntlet-new-dao.txt ]; then
            echo "❌ FAIL: Found remaining direct legacy DAO construction:"
            cat /tmp/gauntlet-new-dao.txt
            exit 1
          else
            echo "✅ PASS: 0 direct legacy DAO construction sites in consumer code"
          fi
