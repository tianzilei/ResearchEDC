# =============================================================================
# ResearchEDC Spring Boot Configuration
# =============================================================================
# Profiles: dev, test, prod
# Usage: --spring.profiles.active=dev
# =============================================================================

# -- Default profile (shared across all environments) --
server:
  port: 8080
  servlet:
    context-path: /research-edc
  tomcat:
    uri-encoding: UTF-8

spring:
  # Application info for Actuator /info endpoint
  application:
    name: ResearchEDC
    version: @project.version@

  # JSP view resolution (legacy UI)
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp
    static-path-pattern: /static/**
    static-path-pattern: /static/**

  # Servlet multipart configuration
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # Jackson serialization
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false

  # Mail (replaces applicationContext-core-email.xml)
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_STARTTLS:false}
      mail.smtps.auth: ${MAIL_SMTPS_AUTH:false}
      mail.smtps.starttls.enable: ${MAIL_SMTPS_STARTTLS:false}
      mail.smtp.connectiontimeout: ${MAIL_SMTP_TIMEOUT:5000}
      mail.smtp.starttls.required: ${MAIL_STARTTLS_REQUIRED:false}
      mail.smtp.ssl.protocols: ${MAIL_SSL_PROTOCOLS:TLSv1.2}

  # Scheduling (replaces applicationContext-core-annotation-scheduler.xml)
  task:
    scheduling:
      pool:
        size: 42

  # Keycloak / OIDC authentication (optional - only activates when KEYCLOAK_ISSUER_URI is set)
  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: ${KEYCLOAK_CLIENT_ID:researchedc-backend}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:}
            user-name-attribute: preferred_username
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:}

  # JPA / Hibernate
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,beans,conditions
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
  show-actuator: true

# =============================================================================
# Profile: dev (development)
# =============================================================================
---
spring:
  config:
    activate:
      on-profile: dev

server:
  port: 8080

logging:
  level:
    org.researchedc: DEBUG
    org.springframework: INFO
    org.hibernate: INFO
    org.hibernate.SQL: DEBUG

# =============================================================================
# Profile: test (testing / CI)
# =============================================================================
---
spring:
  config:
    activate:
      on-profile: test

server:
  port: 0

logging:
  level:
    org.researchedc: DEBUG
    org.springframework: INFO

# =============================================================================
# Profile: prod (production)
# =============================================================================
---
spring:
  config:
    activate:
      on-profile: prod

server:
  port: 8080

logging:
  level:
    org.researchedc: WARN
    org.springframework: WARN
    org.hibernate: WARN

# Production: restrict Actuator to safe endpoints only (P0.1)
# Env, beans, conditions are disabled to prevent sensitive information disclosure
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    env:
      enabled: false
    beans:
      enabled: false
    conditions:
      enabled: false

# Production: disable Swagger UI entirely (P0.2)
# Try-it-out could allow unauthorized API probing in production
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
