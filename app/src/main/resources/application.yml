# =============================================================================
# ResearchEDC Spring Boot Configuration
# =============================================================================
# Profiles: dev, test, prod
# Usage: --spring.profiles.active=dev
# =============================================================================

# -- Default profile (shared across all environments) --
server:
  port: 8080
  servlet:
    context-path: /
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: false
        same-site: lax

logging:
  config: classpath:logback-spring.xml
  tomcat:
    uri-encoding: UTF-8

spring:
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true
    web-application-type: servlet
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.liquibase.LiquibaseAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
  datasource:
    url: jdbc:postgresql://${RESEARCHEDC_DB_HOST:localhost}:${RESEARCHEDC_DB_PORT:5432}/${RESEARCHEDC_DB_NAME:researchedc}
    username: ${RESEARCHEDC_DB_USER:researchedc}
    password: ${RESEARCHEDC_DB_PASS:researchedc}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 12
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 5000
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.id.db_structure_naming_strategy: legacy
      hibernate.id.optimizer.pooled.preferred: none
  application:
    name: ResearchEDC
    version: ${project.version}

  # JSP view resolution (legacy UI)
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp
    static-path-pattern: /static/**

# Database configuration (overridable via env vars: RESEARCHEDC_DB_*)
researchedc:

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false

  task:
    scheduling:
      pool:
        size: 42

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,beans,conditions,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
  show-actuator: true

# =============================================================================
# Profile: dev (development)
# =============================================================================
---
spring:
  config:
    activate:
      on-profile: dev

server:
  port: 8080

logging:
  level:
    org.researchedc: DEBUG
    org.springframework: INFO
    org.hibernate: INFO
    org.hibernate.SQL: DEBUG

# =============================================================================
# Profile: test (testing / CI)
# =============================================================================
---
spring:
  config:
    activate:
      on-profile: test

server:
  port: 0

logging:
  level:
    org.researchedc: DEBUG
    org.springframework: INFO

# =============================================================================
# Profile: prod (production)
# =============================================================================
---
spring:
  config:
    activate:
      on-profile: prod

server:
  port: 8080

logging:
  level:
    org.researchedc: WARN
    org.springframework: WARN
    org.hibernate: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    env:
      enabled: false
    beans:
      enabled: false
    conditions:
      enabled: false

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
