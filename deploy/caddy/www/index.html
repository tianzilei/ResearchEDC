<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResearchEDC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:opsz,wght@28..36,300;28..36,400;28..36,500;28..36,600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <a href="/" class="logo">
      <span class="logo-mark">--</span>
      <span class="logo-text">ResearchEDC</span>
    </a>
    <nav class="nav-links">
      <a href="/login">登录</a>
      <span class="controls">
        <button onclick="toggleTheme()">&#9788;</button>
        <button onclick="toggleLang()">EN</button>
      </span>
    </nav>
  </div>
</header>

<main>
  <section class="hero">
    <div class="container hero-content">
      <div class="hero-badge">v3.18</div>
      <h1 class="hero-title">
        <span data-i18n="heroTitle">临床研究数据管理平台</span>
      </h1>
      <p class="hero-subtitle" data-i18n="heroSub">
        面向研究者发起的临床试验的研究电子数据采集系统。从方案设计到数据分析，安全可靠。
      </p>
      <a href="/login" class="btn btn-primary" data-i18n="signIn">登录系统</a>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container footer-inner">
    <p data-i18n="version">ResearchEDC 0.1</p>
    <div class="footer-links">
      <a href="https://github.com/ResearchEDC" target="_blank">GitHub</a>
    </div>
  </div>
</footer>

<script src="/assets/js/main.js"></script>
</body>
</html>
