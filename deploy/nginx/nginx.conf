upstream researchedc_backend {
    server backend:8080;
}

upstream researchedc_questionnaire {
    server questionnaire:8000;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name researchedc.example.com;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 100M;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # --- Frontend (React SPA) ---
    # Build output: cd frontend && pnpm build -> frontend/dist/
    # Mount frontend/dist/ to /opt/researchedc/frontend/ in production.
    root /opt/researchedc/frontend;

    # React SPA -- all /app/* routes serve index.html for client-side routing
    location /app {
        alias /opt/researchedc/frontend;
        try_files $uri /app/index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Frontend static assets (cache aggressively -- content-addressed by Vite)
    location /assets/ {
        alias /opt/researchedc/frontend/assets/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API endpoints -- proxy to Java backend
    location /api/ {
        proxy_pass http://researchedc_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # Questionnaire service (Python FastAPI)
    location /q/ {
        proxy_pass http://researchedc_questionnaire;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # Root: serve frontend SPA
    location / {
        try_files $uri /app/index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Actuator / health check (internal only)
    location /actuator {
        proxy_pass http://researchedc_backend;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # Deny access to sensitive paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
