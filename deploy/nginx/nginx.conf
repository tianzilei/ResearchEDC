upstream researchedf_web {
    server web:8080;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name openclinica.example.com;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 100M;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # ─── Frontend (React SPA) ─────────────────────────────────────────
    # Serve static files directly from Nginx for performance.
    # Build output: cd frontend && pnpm build → frontend/dist/
    # Mount frontend/dist/ to /opt/researchedc/frontend/ in production.
    root /opt/researchedc/frontend;

    # React SPA — all /app/* routes serve index.html for client-side routing
    location /app {
        alias /opt/researchedc/frontend;
        try_files $uri /app/index.html;
        add_header Cache-Control "no-cache, must-revalidate";

        # If frontend files are not available, fallback to Java backend
        error_page 404 = @java_backend;
    }

    # Frontend static assets (cache aggressively — content-addressed by Vite)
    location /assets/ {
        alias /opt/researchedc/frontend/assets/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Legacy JSP (via Java backend) ─────────────────────────────────
    # Legacy JSP pages and API calls are proxied to the Spring Boot backend
    location @java_backend {
        proxy_pass http://researchedf_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Legacy JSP pages (all paths starting with /legacy or the root)
    location /legacy/ {
        proxy_pass http://researchedf_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints — proxy to Java backend
    location /api/ {
        proxy_pass http://researchedf_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # Questionnaire service (Python FastAPI)
    location /q/ {
        proxy_pass http://researchedf_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Root: serve frontend if available, else legacy JSP ────────────
    location / {
        try_files $uri @java_backend;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Legacy static assets (cache aggressively)
    location /images/ {
        proxy_pass http://researchedf_web;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /includes/ {
        proxy_pass http://researchedf_web;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Actuator / health check (internal only)
    location /SystemStatus {
        proxy_pass http://researchedf_web;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # Web services
    location /ws/ {
        proxy_pass http://researchedf_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Deny access to sensitive paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /WEB-INF/ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /META-INF/ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
