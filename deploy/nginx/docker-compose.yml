# Standalone Nginx reverse proxy for ResearchEDF
# Use this when you want Nginx as a separate service.
# For the integrated setup, see docker-compose.prod.yml (nginx is included there).

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: researchedc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - researchedc-network

networks:
  researchedc-network:
    external: true
