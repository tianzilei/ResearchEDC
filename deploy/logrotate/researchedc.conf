# =============================================================================
# ResearchEDC — Log Rotation Configuration
#
# Place this file at /etc/logrotate.d/researchedc on the bare host.
# =============================================================================

# Application logs
/opt/researchedc/logs/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 100M
}

# Tomcat access logs (if written to volume)
/opt/researchedc/logs/localhost_access_log.*.txt {
    daily
    rotate 14
    compress
    missingok
    notifempty
    copytruncate
}

/opt/researchedc/logs/catalina.*.log {
    daily
    rotate 7
    compress
    missingok
    notifempty
    copytruncate
}

# Tomcat GC logs (if written to volume)
/opt/researchedc/logs/gc.*.log {
    daily
    rotate 7
    compress
    missingok
    notifempty
    copytruncate
}
