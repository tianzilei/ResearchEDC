# =============================================================================
# OpenClinica — Log Rotation Configuration
#
# Place this file at /etc/logrotate.d/openclinica on the Docker host,
# or use the Docker json-file logging driver options set in compose files.
# =============================================================================

# Application logs within Docker volumes
/opt/openclinica/logs/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 100M
}

# Tomcat access logs (if written to volume)
/opt/openclinica/logs/localhost_access_log.*.txt {
    daily
    rotate 14
    compress
    missingok
    notifempty
    copytruncate
}

/opt/openclinica/logs/catalina.*.log {
    daily
    rotate 7
    compress
    missingok
    notifempty
    copytruncate
}

# Tomcat GC logs (if written to volume)
/opt/openclinica/logs/gc.*.log {
    daily
    rotate 7
    compress
    missingok
    notifempty
    copytruncate
}

# Host-level Docker container logs (optional)
/var/lib/docker/containers/*/*.log {
    rotate 7
    daily
    compress
    missingok
    delaycompress
    copytruncate
    maxsize 10M
}
