# =============================================================================
# ResearchEDC — Caddy Reverse Proxy Docker Compose Override
# =============================================================================
#
# Development:
#   docker compose -f deploy/compose/docker-compose.dev.yml \
#       -f deploy/compose/docker-compose.caddy.yml up --build -d
#
# Production:
#   1. Edit deploy/caddy/Caddyfile — replace :80 with your domain
#   2. cd frontend && pnpm install && pnpm build && cd ..
#   3. docker compose -f deploy/compose/docker-compose.prod.yml \
#        -f deploy/compose/docker-compose.caddy.yml up -d
#
# Caddy auto-handles: Let's Encrypt TLS, HTTP/2, HTTP/3, automatic renewal
# =============================================================================

services:
  caddy:
    image: caddy:2-alpine
    container_name: researchedc-caddy
    restart: unless-stopped
    ports:
      - "${RESEARCHEDC_HTTP_PORT:-80}:80"
      - "${RESEARCHEDC_HTTPS_PORT:-443}:443"
      - "${RESEARCHEDC_HTTP3_PORT:-443}:443/udp"
    environment:
      - CADDY_ADMIN=:2019
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../caddy/www:/opt/researchedc/www:ro
      - researchedc-caddy-data:/data
      - researchedc-caddy-config:/config
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - app
      - web
    networks:
      - default
    logging: &caddy-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  researchedc-caddy-data:
    driver: local
  researchedc-caddy-config:
    driver: local
