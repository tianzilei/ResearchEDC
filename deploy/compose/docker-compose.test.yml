x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:17-alpine
    container_name: researchedc-test-postgres
    restart: unless-stopped
    ports:
      - "${RESEARCHEDC_DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-researchedc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-researchedc_test}
      POSTGRES_DB: ${POSTGRES_DB:-researchedc_test}
    volumes:
      - researchedc-test-postgres-data:/var/lib/postgresql/data
      - ../compose/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-researchedc} -d ${POSTGRES_DB:-researchedc_test}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  web:
    build:
      context: ../..
      dockerfile: docker/web/Dockerfile
      target: build
    image: researchedc-web-test:latest
    container_name: researchedc-test-web
    restart: "no"
    environment:
      RESEARCHEDC_DB_HOST: postgres
      RESEARCHEDC_DB_PORT: "5432"
      RESEARCHEDC_DB_NAME: ${RESEARCHEDC_DB_NAME:-researchedc_test}
      RESEARCHEDC_DB_USER: ${RESEARCHEDC_DB_USER:-researchedc}
      RESEARCHEDC_DB_PASS: ${RESEARCHEDC_DB_PASS:-researchedc_test}
      RESEARCHEDC_SYS_URL: http://localhost:8080/MainMenu
      RESEARCHEDC_ADMIN_EMAIL: test@example.com
      RESEARCHEDC_LOG_LEVEL: debug
      RESEARCHEDC_MAIL_HOST: mailhog
      RESEARCHEDC_MAIL_PORT: "1025"
      RESEARCHEDC_HIBERNATE_DDL_AUTO: validate
      RESEARCHEDC_COLLECT_STATS: "false"
      RESEARCHEDC_WEBAPP_NAME: "ROOT"
    volumes:
      - researchedc-test-data:/opt/researchedc/data
      - researchedc-test-logs:/opt/researchedc/logs
    depends_on:
      postgres:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog:latest
    container_name: researchedc-test-mailhog
    restart: "no"
    ports:
      - "${RESEARCHEDC_MAILHOG_HTTP_PORT:-8026}:8025"
    logging: *default-logging

volumes:
  researchedc-test-postgres-data:
    driver: local
  researchedc-test-data:
    driver: local
  researchedc-test-logs:
    driver: local
