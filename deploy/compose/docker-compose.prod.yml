x-logging: &prod-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "7"

services:
  postgres:
    image: postgres:17-alpine
    container_name: researchedc-prod-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - researchedc-prod-postgres-data:/var/lib/postgresql/data
      - ../compose/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    logging: *prod-logging

  web:
    image: ${RESEARCHEDC_WEB_IMAGE:-researchedc-web:latest}
    container_name: researchedc-prod-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # JVM tuning: heap auto-scales to 75% of 4G limit via CATALINA_OPTS (set in Dockerfile)
      RESEARCHEDC_DB_HOST: postgres
      RESEARCHEDC_DB_PORT: "5432"
      RESEARCHEDC_DB_NAME: ${RESEARCHEDC_DB_NAME:?RESEARCHEDC_DB_NAME is required}
      RESEARCHEDC_DB_USER: ${RESEARCHEDC_DB_USER:?RESEARCHEDC_DB_USER is required}
      RESEARCHEDC_DB_PASS: ${RESEARCHEDC_DB_PASS:?RESEARCHEDC_DB_PASS is required}
      RESEARCHEDC_SYS_URL: ${RESEARCHEDC_SYS_URL:?RESEARCHEDC_SYS_URL is required}
      RESEARCHEDC_ADMIN_EMAIL: ${RESEARCHEDC_ADMIN_EMAIL:?RESEARCHEDC_ADMIN_EMAIL is required}
      RESEARCHEDC_FILE_PATH: /opt/researchedc/data
      RESEARCHEDC_LOG_DIR: /opt/researchedc/logs
      RESEARCHEDC_LOG_LEVEL: ${RESEARCHEDC_LOG_LEVEL:-warn}
      RESEARCHEDC_MAIL_HOST: ${RESEARCHEDC_MAIL_HOST:?RESEARCHEDC_MAIL_HOST is required}
      RESEARCHEDC_MAIL_PORT: ${RESEARCHEDC_MAIL_PORT:-587}
      RESEARCHEDC_MAIL_PROTOCOL: ${RESEARCHEDC_MAIL_PROTOCOL:-smtp}
      RESEARCHEDC_MAIL_USER: ${RESEARCHEDC_MAIL_USER:-}
      RESEARCHEDC_MAIL_PASS: ${RESEARCHEDC_MAIL_PASS:-}
      RESEARCHEDC_MAIL_AUTH: ${RESEARCHEDC_MAIL_AUTH:-true}
      RESEARCHEDC_MAIL_STARTTLS: ${RESEARCHEDC_MAIL_STARTTLS:-true}
      RESEARCHEDC_LDAP_ENABLED: ${RESEARCHEDC_LDAP_ENABLED:-false}
      RESEARCHEDC_HIBERNATE_DDL_AUTO: ${RESEARCHEDC_HIBERNATE_DDL_AUTO:-none}
      RESEARCHEDC_COLLECT_STATS: ${RESEARCHEDC_COLLECT_STATS:-false}
      RESEARCHEDC_MAX_INACTIVE_INTERVAL: ${RESEARCHEDC_MAX_INACTIVE_INTERVAL:-1800}
      TZ: ${TZ:-UTC}
      RESEARCHEDC_WEBAPP_NAME: "ROOT"
    volumes:
      - researchedc-prod-data:/opt/researchedc/data
      - researchedc-prod-logs:/opt/researchedc/logs
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    logging: *prod-logging

  nginx:
    image: nginx:1.27-alpine
    container_name: researchedc-prod-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
      - researchedc-prod-data:/opt/researchedc/data:ro
    depends_on:
      - web
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging: *prod-logging

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: researchedc-prod-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ../prometheus:/etc/prometheus:ro
      - researchedc-prod-prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *prod-logging

  grafana:
    image: grafana/grafana:11.1.0
    container_name: researchedc-prod-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ../grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - researchedc-prod-grafana-data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *prod-logging

volumes:
  researchedc-prod-postgres-data:
    driver: local
  researchedc-prod-data:
    driver: local
  researchedc-prod-logs:
    driver: local
  researchedc-prod-prometheus-data:
    driver: local
  researchedc-prod-grafana-data:
    driver: local
