x-logging: &prod-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "7"

services:
  postgres:
    image: postgres:17-alpine
    container_name: oc-prod-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - oc-prod-postgres-data:/var/lib/postgresql/data
      - ../compose/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    logging: *prod-logging

  web:
    image: ${OC_WEB_IMAGE:-openclinica-web:latest}
    container_name: oc-prod-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # JVM tuning: heap auto-scales to 75% of 4G limit via CATALINA_OPTS (set in Dockerfile)
      OC_DB_HOST: postgres
      OC_DB_PORT: "5432"
      OC_DB_NAME: ${OC_DB_NAME:?OC_DB_NAME is required}
      OC_DB_USER: ${OC_DB_USER:?OC_DB_USER is required}
      OC_DB_PASS: ${OC_DB_PASS:?OC_DB_PASS is required}
      OC_SYS_URL: ${OC_SYS_URL:?OC_SYS_URL is required}
      OC_ADMIN_EMAIL: ${OC_ADMIN_EMAIL:?OC_ADMIN_EMAIL is required}
      OC_FILE_PATH: /opt/openclinica/data
      OC_LOG_DIR: /opt/openclinica/logs
      OC_LOG_LEVEL: ${OC_LOG_LEVEL:-warn}
      OC_MAIL_HOST: ${OC_MAIL_HOST:?OC_MAIL_HOST is required}
      OC_MAIL_PORT: ${OC_MAIL_PORT:-587}
      OC_MAIL_PROTOCOL: ${OC_MAIL_PROTOCOL:-smtp}
      OC_MAIL_USER: ${OC_MAIL_USER:-}
      OC_MAIL_PASS: ${OC_MAIL_PASS:-}
      OC_MAIL_AUTH: ${OC_MAIL_AUTH:-true}
      OC_MAIL_STARTTLS: ${OC_MAIL_STARTTLS:-true}
      OC_LDAP_ENABLED: ${OC_LDAP_ENABLED:-false}
      OC_HIBERNATE_DDL_AUTO: ${OC_HIBERNATE_DDL_AUTO:-none}
      OC_COLLECT_STATS: ${OC_COLLECT_STATS:-false}
      OC_MAX_INACTIVE_INTERVAL: ${OC_MAX_INACTIVE_INTERVAL:-1800}
      TZ: ${TZ:-UTC}
      OC_WEBAPP_NAME: "ROOT"
    volumes:
      - oc-prod-data:/opt/openclinica/data
      - oc-prod-logs:/opt/openclinica/logs
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    logging: *prod-logging

  nginx:
    image: nginx:1.27-alpine
    container_name: oc-prod-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
      - oc-prod-data:/opt/openclinica/data:ro
    depends_on:
      - web
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging: *prod-logging

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: oc-prod-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ../prometheus:/etc/prometheus:ro
      - oc-prod-prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *prod-logging

  grafana:
    image: grafana/grafana:11.1.0
    container_name: oc-prod-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ../grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - oc-prod-grafana-data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *prod-logging

volumes:
  oc-prod-postgres-data:
    driver: local
  oc-prod-data:
    driver: local
  oc-prod-logs:
    driver: local
  oc-prod-prometheus-data:
    driver: local
  oc-prod-grafana-data:
    driver: local
