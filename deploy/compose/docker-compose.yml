# ResearchEDC — Docker Compose Production Stack
# Usage: docker compose -f deploy/compose/docker-compose.yml up -d --build
# Managed via: bash deploy.sh docker-build / docker-up / docker-down / docker-logs
#
# Services:
#   nginx         — Reverse proxy on port 80 (HTTP) + 443 (HTTPS optional)
#   backend       — Spring Boot app (port 8080 internal)
#   questionnaire — Python FastAPI (port 8000 internal)
#   postgres      — PostgreSQL 17 (port 5432)
#   redis         — Redis 7 (port 6379, internal only)
#   minio         — Object storage (ports 9000/9001)

services:
  postgres:
    image: postgres:17-alpine
    container_name: researchedc-pg
    restart: unless-stopped
    ports:
      - "${RESEARCHEDC_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${RESEARCHEDC_DB_NAME:-researchedc}
      POSTGRES_USER: ${RESEARCHEDC_DB_USER:-researchedc}
      POSTGRES_PASSWORD: ${RESEARCHEDC_DB_PASS:-researchedc}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/seed-data.sql:/docker-entrypoint-initdb.d/01-seed-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RESEARCHEDC_DB_USER:-researchedc} -d ${RESEARCHEDC_DB_NAME:-researchedc}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - researchedc-net

  redis:
    image: redis:7-alpine
    container_name: researchedc-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - researchedc-net

  backend:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: researchedc-backend
    restart: unless-stopped
    environment:
      RESEARCHEDC_DB_HOST: postgres
      RESEARCHEDC_DB_PORT: "5432"
      RESEARCHEDC_DB_NAME: ${RESEARCHEDC_DB_NAME:-researchedc}
      RESEARCHEDC_DB_USER: ${RESEARCHEDC_DB_USER:-researchedc}
      RESEARCHEDC_DB_PASS: ${RESEARCHEDC_DB_PASS:-researchedc}
      SPRING_PROFILES_ACTIVE: dev
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      CATALINA_HOME: /app
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
      - ./docker/datainfo.properties:/app/ROOT.config/datainfo.properties:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - researchedc-net

  questionnaire:
    build:
      context: ../../questionnaire-service/apps/api
      dockerfile: ../../Dockerfile
    container_name: researchedc-questionnaire
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${RESEARCHEDC_DB_USER:-researchedc}:${RESEARCHEDC_DB_PASS:-researchedc}@postgres:5432/researchedc_questionnaire
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${RESEARCHEDC_SECRET_KEY:-dev-secret-key-change-in-production}
      CORS_ORIGINS: '["http://localhost:8080"]'
      HOST: 0.0.0.0
      PORT: "8000"
      LOG_LEVEL: info
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${RESEARCHEDC_MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${RESEARCHEDC_MINIO_ROOT_PASS:-minio-password}
      MINIO_BUCKET: ${RESEARCHEDC_MINIO_BUCKET:-questionnaire-exports}
      MINIO_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - researchedc-net

  minio:
    image: minio/minio:latest
    container_name: researchedc-minio
    restart: unless-stopped
    ports:
      - "${RESEARCHEDC_MINIO_PORT:-9000}:9000"
      - "${RESEARCHEDC_MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${RESEARCHEDC_MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${RESEARCHEDC_MINIO_ROOT_PASS:-minio-password}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - researchedc-net

  nginx:
    image: nginx:1.27-alpine
    container_name: researchedc-nginx
    restart: unless-stopped
    ports:
      - "${RESEARCHEDC_NGINX_HTTP_PORT:-80}:80"
      - "${RESEARCHEDC_NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - questionnaire
    networks:
      - researchedc-net

volumes:
  pgdata:
  miniodata:
  backend-data:
  backend-logs:

networks:
  researchedc-net:
    driver: bridge
