# =============================================================================
# ResearchEDC Development Docker Compose
#
# Services:
#   postgres  — PostgreSQL 17 database
#   web       — ResearchEDC Web application (Tomcat 10.1 + JDK 21)
#   ws        — ResearchEDC Web Services (Tomcat 10.1 + JDK 21)
#   mailhog   — SMTP test server (captures emails without sending)
#   adminer   — Database administration UI
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ---- Database ----
  postgres:
    image: postgres:17-alpine
    container_name: researchedc-postgres
    restart: unless-stopped
    ports:
      - "${RESEARCHEDC_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-researchedc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-researchedc}
      POSTGRES_DB: ${POSTGRES_DB:-researchedc}
    volumes:
      - researchedc-postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-researchedc} -d ${POSTGRES_DB:-researchedc}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # ---- ResearchEDC Web ----
  web:
    build:
      context: ../..
      dockerfile: docker/web/Dockerfile
    container_name: researchedc-web
    restart: unless-stopped
    ports:
      - "${RESEARCHEDC_WEB_PORT:-8080}:8080"
    environment:
      RESEARCHEDC_DB_HOST: postgres
      RESEARCHEDC_DB_PORT: "5432"
      RESEARCHEDC_DB_NAME: ${RESEARCHEDC_DB_NAME:-researchedc}
      RESEARCHEDC_DB_USER: ${RESEARCHEDC_DB_USER:-researchedc}
      RESEARCHEDC_DB_PASS: ${RESEARCHEDC_DB_PASS:-researchedc}
      RESEARCHEDC_SYS_URL: ${RESEARCHEDC_SYS_URL:-http://localhost:8080/MainMenu}
      RESEARCHEDC_ADMIN_EMAIL: ${RESEARCHEDC_ADMIN_EMAIL:-admin@example.com}
      RESEARCHEDC_LOG_LEVEL: ${RESEARCHEDC_LOG_LEVEL:-info}
      RESEARCHEDC_MAIL_HOST: mailhog
      RESEARCHEDC_MAIL_PORT: "1025"
      RESEARCHEDC_MAIL_AUTH: "false"
      RESEARCHEDC_LDAP_ENABLED: "false"
      RESEARCHEDC_WEBAPP_NAME: "ROOT"
    volumes:
      - researchedc-data:/opt/researchedc/data
      - researchedc-logs:/opt/researchedc/logs
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging

  # ---- ResearchEDC Web Services ----
  ws:
    build:
      context: ../..
      dockerfile: docker/ws/Dockerfile
    container_name: researchedc-ws
    restart: unless-stopped
    ports:
      - "${RESEARCHEDC_WS_PORT:-8081}:8080"
    environment:
      RESEARCHEDC_DB_HOST: postgres
      RESEARCHEDC_DB_PORT: "5432"
      RESEARCHEDC_DB_NAME: ${RESEARCHEDC_DB_NAME:-researchedc}
      RESEARCHEDC_DB_USER: ${RESEARCHEDC_DB_USER:-researchedc}
      RESEARCHEDC_DB_PASS: ${RESEARCHEDC_DB_PASS:-researchedc}
      RESEARCHEDC_SYS_URL: ${RESEARCHEDC_SYS_URL:-http://localhost:8080/MainMenu}
      RESEARCHEDC_LOG_LEVEL: ${RESEARCHEDC_LOG_LEVEL:-info}
      RESEARCHEDC_MAIL_HOST: mailhog
      RESEARCHEDC_MAIL_PORT: "1025"
      RESEARCHEDC_MAIL_AUTH: "false"
      RESEARCHEDC_LDAP_ENABLED: "false"
      RESEARCHEDC_WEBAPP_NAME: "ROOT"
    volumes:
      - researchedc-data:/opt/researchedc/data
      - researchedc-logs:/opt/researchedc/logs
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging

  # ---- ResearchEDC App (Spring Boot + React SPA) ----
  app:
    build:
      context: ../..
      dockerfile: docker/app/Dockerfile
    container_name: researchedc-app
    restart: unless-stopped
    ports:
      - "${RESEARCHEDC_APP_PORT:-8083}:8080"
    environment:
      RESEARCHEDC_DB_HOST: postgres
      RESEARCHEDC_DB_PORT: "5432"
      RESEARCHEDC_DB_NAME: ${RESEARCHEDC_DB_NAME:-researchedc}
      RESEARCHEDC_DB_USER: ${RESEARCHEDC_DB_USER:-researchedc}
      RESEARCHEDC_DB_PASS: ${RESEARCHEDC_DB_PASS:-researchedc}
      RESEARCHEDC_SYS_URL: ${RESEARCHEDC_SYS_URL:-http://localhost:8083/app/dashboard}
      RESEARCHEDC_ADMIN_EMAIL: ${RESEARCHEDC_ADMIN_EMAIL:-admin@example.com}
      RESEARCHEDC_LOG_LEVEL: ${RESEARCHEDC_LOG_LEVEL:-info}
      RESEARCHEDC_MAIL_HOST: mailhog
      RESEARCHEDC_MAIL_PORT: "1025"
      RESEARCHEDC_MAIL_AUTH: "false"
      RESEARCHEDC_LDAP_ENABLED: "false"
      RESEARCHEDC_WEBAPP_NAME: "ROOT"
    volumes:
      - researchedc-data:/opt/researchedc/data
      - researchedc-logs:/opt/researchedc/logs
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging

  # ---- MailHog (SMTP capture for development) ----
  mailhog:
    image: mailhog/mailhog:latest
    container_name: researchedc-mailhog
    restart: unless-stopped
    ports:
      - "${RESEARCHEDC_MAILHOG_HTTP_PORT:-8025}:8025"
    logging: *default-logging

  # ---- Adminer (Database admin UI) ----
  adminer:
    image: adminer:latest
    container_name: researchedc-adminer
    restart: unless-stopped
    ports:
      - "${RESEARCHEDC_ADMINER_PORT:-8082}:8080"
    depends_on:
      - postgres
    logging: *default-logging

volumes:
  researchedc-postgres-data:
    driver: local
  researchedc-data:
    driver: local
  researchedc-logs:
    driver: local
