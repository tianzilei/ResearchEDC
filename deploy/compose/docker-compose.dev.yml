# ResearchEDC Dev Environment — PostgreSQL + Spring Boot Backend
# Usage: docker compose -f deploy/compose/docker-compose.dev.yml up -d --build
# Then:  cd frontend && pnpm dev     (Vite dev server for frontend)
# Then:  cd frontend && pnpm test:e2e (Playwright against Vite proxy)
services:
  postgres:
    image: postgres:17-alpine
    container_name: researchedc-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: researchedc
      POSTGRES_USER: researchedc
      POSTGRES_PASSWORD: researchedc
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../deploy/docker/seed-data.sql:/docker-entrypoint-initdb.d/01-seed-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchedc -d researchedc"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: researchedc-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      RESEARCHEDC_DB_HOST: postgres
      RESEARCHEDC_DB_PORT: "5432"
      RESEARCHEDC_DB_NAME: researchedc
      RESEARCHEDC_DB_USER: researchedc
      RESEARCHEDC_DB_PASS: researchedc
      SPRING_PROFILES_ACTIVE: dev
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: TRACE
      CATALINA_HOME: /app
    volumes:
      - ../../deploy/docker/datainfo.properties:/app/ROOT.config/datainfo.properties:ro
      - ../../app/target/ResearchEDC.war:/app/app.war
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
